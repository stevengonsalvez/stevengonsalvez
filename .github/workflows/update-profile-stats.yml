name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stats SVGs
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}
          PROFILE_USERNAME: stevengonsalvez
        run: python scripts/update_stats.py

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile stats"
          file_pattern: assets/stats/*.svg
